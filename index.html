<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#EDF5FD">
<title>HSK 30-Day Mastery · ISRAFIL HOSSEN · UCAS</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-title" content="HSK Mastery">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;700;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#EDF5FD;--bg2:#F5F9FE;--bg3:#fff;--tx:#152030;--tx2:#3D5A73;--tx3:#7E9BB5;
--pri:#1A73E8;--pri-l:#5BA3F5;--pri-d:#0D47A1;--pri-bg:rgba(26,115,232,.07);--pri-bg2:rgba(26,115,232,.14);
--acc:#E8590C;--acc-bg:rgba(232,89,12,.08);
--ok:#0F9D58;--ok-bg:rgba(15,157,88,.08);--warn:#F4B400;--warn-bg:rgba(244,180,0,.1);
--err:#DB4437;--err-bg:rgba(219,68,55,.08);
--h1:#0F9D58;--h2:#1A73E8;--h3:#F4B400;--h4:#DB4437;
--r:14px;--r2:10px;--sh:0 1px 8px rgba(0,0,0,.05);--sh2:0 4px 16px rgba(0,0,0,.08);
--font:'Outfit','Noto Sans SC',sans-serif;--cn:'Noto Sans SC',sans-serif;--se:'Noto Serif SC',serif}
html{-webkit-tap-highlight-color:transparent;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100dvh;overflow-x:hidden;line-height:1.5;padding-bottom:70px}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(170deg,#EDF5FD 0%,#DAEAF8 50%,#C5DDEF 100%);z-index:-1;pointer-events:none}

/* === HEADER === */
.hd{position:sticky;top:0;z-index:100;background:rgba(237,245,253,.88);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid rgba(26,115,232,.06);padding:8px 14px;padding-top:max(8px,env(safe-area-inset-top))}
.hd-in{max-width:640px;margin:0 auto;display:flex;align-items:center;gap:8px}
.logo{display:flex;align-items:center;gap:7px;cursor:pointer}.logo-i{width:36px;height:36px;background:linear-gradient(135deg,#4DA3FF,#1A73E8);border-radius:9px;display:flex;align-items:center;justify-content:center;font:900 1.1rem var(--se);color:#fff;box-shadow:0 2px 6px rgba(26,115,232,.25)}.logo-t{font-size:.82rem;font-weight:800;letter-spacing:-.02em}.logo-s{font-size:.58rem;color:var(--tx3);font-weight:500}
.hd-r{margin-left:auto;display:flex;gap:6px;align-items:center}
.badge{display:flex;align-items:center;gap:3px;padding:3px 8px;border-radius:50px;font-size:.65rem;font-weight:700}
.badge-ok{background:var(--ok-bg);color:#0A7B43}.badge-warn{background:var(--warn-bg);color:#A67C00}

/* === TABS === */
.tabs{max-width:640px;margin:0 auto;padding:5px 14px 0;display:flex;gap:3px;overflow-x:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tab{padding:4px 13px;border-radius:50px;border:1.5px solid rgba(26,115,232,.1);background:#fff;color:var(--tx2);font-size:.7rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:.2s;font-family:var(--font);flex-shrink:0}
.tab.on{color:#fff;border-color:transparent}
.tab[data-l="0"].on{background:var(--pri)}.tab[data-l="1"].on{background:var(--h1)}.tab[data-l="2"].on{background:var(--h2)}.tab[data-l="3"].on{background:var(--h3);color:#543D00}.tab[data-l="4"].on{background:var(--h4)}

/* === CONTENT AREA === */
.mx{max-width:640px;margin:0 auto;padding:0 14px}

/* === INFO CARD === */
.icard{background:#fff;border-radius:var(--r);padding:12px;display:flex;align-items:center;gap:11px;box-shadow:var(--sh);margin-top:8px}
.icard-icon{width:52px;height:52px;background:linear-gradient(135deg,#4DA3FF,#0D47A1);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.icard h2{font-size:.85rem;font-weight:700}.icard .ist{display:flex;gap:12px;margin-top:3px}.icard .is{font-size:.68rem;color:var(--tx3);display:flex;align-items:center;gap:3px}.icard .is .d{width:6px;height:6px;border-radius:50%}.d-b{background:var(--pri)}.d-g{background:var(--ok)}.d-y{background:var(--warn)}

/* === PROGRESS === */
.pbar{height:5px;background:#D8E6F0;border-radius:5px;overflow:hidden;margin-top:6px}.pfill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--h1),var(--h2),var(--h3),var(--h4));transition:width .5s}.plbl{display:flex;justify-content:space-between;margin-top:2px;font-size:.62rem;color:var(--tx3)}

/* === SEARCH === */
.srch{position:relative;margin-top:7px}.srch input{width:100%;padding:8px 11px 8px 34px;border:1.5px solid rgba(26,115,232,.1);border-radius:var(--r2);background:#fff;font:.82rem var(--font);outline:none;color:var(--tx)}.srch input:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(26,115,232,.08)}.srch input::placeholder{color:var(--tx3)}.srch svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--tx3);pointer-events:none}

/* === DAY GRID === */
.stit{display:flex;align-items:center;gap:6px;margin:12px 0 5px}.stit .si{width:20px;height:20px;background:var(--pri);border-radius:5px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.6rem;font-weight:800}.stit h3{font-size:.8rem;font-weight:700}.stit .sc{font-size:.66rem;color:var(--tx3);margin-left:auto}
.dgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding-bottom:20px}
.dtile{aspect-ratio:1;background:#fff;border:2px solid rgba(26,115,232,.08);border-radius:var(--r2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:.2s;position:relative;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.dtile:hover{transform:translateY(-2px);box-shadow:var(--sh2)}.dtile:active{transform:scale(.96)}
.dtile .dn{font-size:1.25rem;font-weight:800;color:var(--pri);line-height:1}.dtile .dl{font-size:.48rem;color:var(--tx3);font-weight:600;margin-top:1px}
.dtile .db{position:absolute;top:3px;right:3px;min-width:14px;height:14px;border-radius:3px;background:var(--pri-bg);display:flex;align-items:center;justify-content:center;font-size:.42rem;font-weight:800;color:var(--pri);padding:0 2px}
.dtile.cmp{background:linear-gradient(135deg,#E6F4EA,#CEEAD6);border-color:#81C784}.dtile.cmp .dn{color:var(--ok)}.dtile.cmp .db{background:var(--ok);color:#fff}
.dtile.prt{border-color:var(--warn)}.dtile.prt .db{background:var(--warn);color:#fff}
.dtile.tdy{border-color:var(--pri);border-width:2.5px;box-shadow:0 0 0 3px rgba(26,115,232,.1)}
.dtile .dpb{position:absolute;bottom:0;left:0;right:0;height:2.5px;background:#E4ECF2;border-radius:0 0 8px 8px;overflow:hidden}.dtile .dpf{height:100%;background:var(--pri);transition:width .3s}

/* === DAY VIEW === */
.dview{display:none}.dview.show{display:block}
.bbtn{display:inline-flex;align-items:center;gap:4px;background:none;border:none;color:var(--pri);font:.82rem/1 var(--font);font-weight:600;cursor:pointer;padding:8px 0}
.dhdr{background:#fff;border-radius:var(--r);padding:12px;margin:5px 0 8px;box-shadow:var(--sh);display:flex;align-items:center;justify-content:space-between}
.dhdr h2{font-size:.95rem;font-weight:800}.dhdr .sub{font-size:.65rem;color:var(--tx3);margin-top:1px}.dhdr .fr{font-size:1.2rem;font-weight:800;color:var(--pri)}.dhdr .lbl{font-size:.58rem;color:var(--tx3)}

/* Mode toggle */
.mtog{display:flex;margin-bottom:10px;border-radius:var(--r2);overflow:hidden;border:1.5px solid rgba(26,115,232,.12);background:#fff}
.mbtn{flex:1;padding:9px;border:none;background:transparent;color:var(--tx2);font:.78rem/1 var(--font);font-weight:600;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:4px}
.mbtn.on{background:var(--pri-bg2);color:var(--pri-d)}.mbtn+.mbtn{border-left:1.5px solid rgba(26,115,232,.08)}

/* === LEARN MODE === */
.llist{display:none}.llist.show{display:block}
.lwrap{background:#fff;border-radius:var(--r2);box-shadow:var(--sh);overflow:hidden}

/* Root group header */
.rghdr{display:flex;align-items:center;gap:8px;padding:10px 12px 4px;background:#F8FBFE}
.rgchar{font:900 1.3rem var(--se);color:var(--pri-d);width:36px;height:36px;background:var(--pri-bg);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:.2s}
.rgchar:hover{background:var(--pri);color:#fff}
.rginfo{flex:1}.rginfo .rn{font-size:.72rem;font-weight:600;color:var(--tx)}.rginfo .rc{font-size:.6rem;color:var(--tx3)}
.rgline{flex:1;height:1px;background:linear-gradient(90deg,rgba(26,115,232,.12),transparent)}

/* Word card in learn list */
.wc{padding:12px;border-bottom:1px solid #EEF3F7;cursor:pointer;transition:background .12s}
.wc:last-child{border-bottom:none}.wc:hover{background:#F6FAFD}.wc:active{background:#EEF5FC}
.wc .wpy{font-size:.78rem;color:var(--tx3);font-weight:500}
.wc .whz{font:700 1.6rem/1.25 var(--se);display:flex;align-items:center;gap:7px;margin:1px 0 2px}
.wc .whz .spk{width:26px;height:26px;border-radius:50%;background:var(--pri-bg);color:var(--pri);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:.7rem;flex-shrink:0;border:none;transition:.2s}
.wc .whz .spk:hover{background:var(--pri);color:#fff}
.wc .wmeta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.wc .wpos{font-size:.6rem;color:var(--pri);font-weight:700;background:var(--pri-bg);padding:1px 6px;border-radius:50px}
.wc .wmn{font-size:.78rem;color:var(--tx2)}
.wc .wdec{font-size:.62rem;color:var(--acc);background:var(--acc-bg);padding:2px 6px;border-radius:50px;margin-left:auto}

/* === PRACTICE MODE === */
.prac{display:none;text-align:center;padding:8px 0}.prac.show{display:block}
.pdots{display:flex;gap:3px;margin-bottom:14px;justify-content:center}.pdot{width:20px;height:3.5px;border-radius:3px;background:#DCE6EF;transition:.3s}.pdot.dn{background:var(--ok)}.pdot.cur{background:var(--pri)}.pdot.wr{background:var(--err)}
.pinst{font-size:.75rem;color:var(--tx3);margin-bottom:20px}
.pprm{font-size:1.3rem;font-weight:700;margin-bottom:6px;line-height:1.4;min-height:60px;display:flex;align-items:center;justify-content:center}
.pslots{display:flex;gap:5px;justify-content:center;margin-bottom:28px;min-height:44px;flex-wrap:wrap;align-items:center}
.psl{min-width:38px;height:40px;border-bottom:2px solid #C8D6E0;display:flex;align-items:center;justify-content:center;font:700 1.2rem var(--cn);transition:.2s;padding:0 4px;cursor:pointer}
.psl.fl{border-color:var(--pri);color:var(--pri-d)}.psl.ok{border-color:var(--ok);color:var(--ok)}.psl.wr{border-color:var(--err);color:var(--err)}
.pchs{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.pch{min-width:52px;height:44px;border-radius:var(--r2);background:#F2F6FA;border:1.5px solid #DCE6EF;font:600 1.1rem var(--cn);cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;padding:0 8px}
.pch:hover{border-color:var(--pri-l);background:var(--pri-bg)}.pch:active{transform:scale(.95)}.pch.used{opacity:.25;pointer-events:none}
.pres{padding:14px;background:#fff;border-radius:var(--r2);box-shadow:var(--sh);margin-top:14px}
.pres h3{font-size:.95rem;font-weight:700}.pres .psc{font-size:1.8rem;font-weight:800;color:var(--pri)}
.pnxt{margin-top:12px;padding:10px 28px;border:none;border-radius:50px;background:var(--pri);color:#fff;font:.85rem/1 var(--font);font-weight:700;cursor:pointer}
.pskip{margin-top:6px;background:none;border:none;color:var(--tx3);font:.75rem var(--font);cursor:pointer;padding:6px 14px}

/* === QUIZ MODE === */
.quiz{display:none;text-align:center;padding:8px 0}.quiz.show{display:block}
.qcard{background:#fff;border-radius:var(--r);padding:24px 16px;box-shadow:var(--sh);margin-bottom:12px}
.qcard .qhz{font:900 2.8rem/1.2 var(--se)}.qcard .qpy{font-size:1rem;color:var(--acc);font-weight:600;margin-top:4px}
.qopts{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.qopt{padding:10px;border:1.5px solid #DCE6EF;border-radius:var(--r2);background:#fff;font:.82rem/1.3 var(--font);cursor:pointer;transition:.15s;text-align:left}
.qopt:hover{border-color:var(--pri-l);background:var(--pri-bg)}.qopt:active{transform:scale(.98)}
.qopt.right{background:var(--ok-bg);border-color:var(--ok);color:#0A7B43;pointer-events:none}
.qopt.wrong{background:var(--err-bg);border-color:var(--err);color:#B71C1C;pointer-events:none}
.qopt.dis{pointer-events:none;opacity:.5}

/* === DETAIL VIEW === */
.detv{display:none}.detv.show{display:block}
.dcard{background:#fff;border-radius:var(--r);padding:18px;box-shadow:var(--sh);margin-top:6px}
.dtop{display:flex;justify-content:space-between;align-items:flex-start}
.dtbtn{width:32px;height:32px;border-radius:50%;border:1.5px solid #DCE6EF;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx3);font-size:.82rem;transition:.2s}.dtbtn:hover{border-color:var(--pri);color:var(--pri)}.dtbtn.on{background:var(--ok);border-color:var(--ok);color:#fff}
.dpy{font-size:.95rem;color:var(--tx3);font-weight:500;margin-bottom:3px}
.dhz{font:900 2.8rem/1.2 var(--se);display:flex;align-items:center;gap:8px;margin-bottom:4px}
.dhz .dsp{width:34px;height:34px;border-radius:50%;background:var(--pri-bg);color:var(--pri);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;font-size:1rem;transition:.2s}.dhz .dsp:hover{background:var(--pri);color:#fff}
.dpos{display:inline-block;padding:2px 9px;border-radius:50px;font-size:.65rem;font-weight:700;margin-bottom:5px}
.dpos-v{background:rgba(26,115,232,.08);color:var(--pri)}.dpos-n{background:var(--ok-bg);color:#0A7B43}.dpos-adj{background:rgba(232,89,12,.08);color:#BF360C}.dpos-adv{background:rgba(106,27,154,.08);color:#6A1B9A}.dpos-conj{background:rgba(62,80,96,.08);color:#37474F}.dpos-other{background:var(--pri-bg);color:var(--pri)}
.dmn{font-size:.95rem;color:var(--tx2);line-height:1.5}

/* Decomposition box */
.ddec{background:var(--acc-bg);border-radius:var(--r2);padding:10px;margin-top:10px;text-align:center}
.ddec .ddl{font-size:.55rem;color:var(--acc);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:3px}
.ddec .ddf{font:700 1.1rem var(--cn);color:#BF360C;line-height:1.6}

/* Root box */
.droot{background:var(--pri-bg);border-radius:var(--r2);padding:10px;margin-top:10px;text-align:center}
.droot .drl{font-size:.55rem;color:var(--pri);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:2px}
.droot .drc{font:900 1.6rem var(--se);color:var(--pri-d)}
.droot .drw{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:5px}
.droot .drch{font:400 .78rem var(--cn);padding:4px 8px;background:#fff;border-radius:5px;cursor:pointer;border:1px solid transparent;transition:.2s}.droot .drch:hover{border-color:var(--pri)}
.droot .drch small{font-size:.6rem;color:var(--tx3)}

/* Examples */
.dexs{margin-top:12px;padding-top:10px;border-top:1px solid #EEF3F7}
.dexs h4{font-size:.72rem;color:var(--tx3);text-align:center;margin-bottom:10px;display:flex;align-items:center;gap:6px;justify-content:center}.dexs h4::before,.dexs h4::after{content:'';flex:1;height:1px;background:#E4ECF2;max-width:60px}
.exc{background:#F6FAFD;border-radius:var(--r2);padding:11px;margin-bottom:7px;position:relative}
.exc .ep{font-size:.72rem;color:var(--tx3);line-height:1.5}.exc .eh{font:400 1rem/1.7 var(--cn);letter-spacing:.3px}.exc .eh .hl{color:var(--pri);font-weight:600}
.exc .em{font-size:.72rem;color:var(--tx3);margin-top:2px;font-style:italic}
.exc .es{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:var(--pri-bg);color:var(--pri);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.72rem;transition:.2s}.exc .es:hover{background:var(--pri);color:#fff}

/* SRS buttons */
.srs-btns{display:flex;gap:5px;margin-top:10px}
.srs-btn{flex:1;padding:10px;border:2px solid transparent;border-radius:var(--r2);font:.78rem/1 var(--font);font-weight:700;cursor:pointer;transition:.2s;text-align:center}
.srs-hard{background:var(--err-bg);border-color:rgba(219,68,55,.2);color:#B71C1C}
.srs-mid{background:var(--warn-bg);border-color:rgba(244,180,0,.2);color:#A67C00}
.srs-easy{background:var(--ok-bg);border-color:rgba(15,157,88,.2);color:#0A7B43}
.srs-btn:hover{transform:translateY(-1px)}

/* === REVIEW TAB === */
.revw{display:none}.revw.show{display:block}
.rev-empty{text-align:center;padding:32px 16px;color:var(--tx3)}
.rev-empty .big{font-size:2.5rem;margin-bottom:8px;opacity:.3}

/* === STATS === */
.statsv{display:none}.statsv.show{display:block}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.sbox{background:#fff;border-radius:var(--r2);padding:12px;text-align:center;box-shadow:var(--sh)}.sbox .sv{font-size:1.6rem;font-weight:800}.sv-1{color:var(--pri)}.sv-2{color:var(--ok)}.sv-3{color:var(--warn)}.sv-4{color:var(--acc)}.sbox .sl{font-size:.65rem;color:var(--tx3);margin-top:1px}
.lvprog{background:#fff;border-radius:var(--r2);padding:12px;box-shadow:var(--sh)}
.lvrow{display:flex;align-items:center;gap:7px;margin-bottom:7px}.lvrow:last-child{margin-bottom:0}.lvn{font-size:.72rem;font-weight:600;width:44px}.lvt{flex:1;height:6px;background:#EEE;border-radius:6px;overflow:hidden}.lvf{height:100%;border-radius:6px;transition:width .5s}.lvf-1{background:var(--h1)}.lvf-2{background:var(--h2)}.lvf-3{background:var(--h3)}.lvf-4{background:var(--h4)}.lvpc{font-size:.65rem;color:var(--tx3);width:32px;text-align:right}
.rstbtn{width:100%;padding:10px;border:2px solid var(--err);border-radius:var(--r2);background:transparent;color:var(--err);font:.8rem/1 var(--font);font-weight:600;cursor:pointer;margin-top:12px;transition:.2s}.rstbtn:hover{background:var(--err);color:#fff}

/* === BOTTOM NAV === */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid rgba(26,115,232,.06);z-index:90;padding:4px 0;padding-bottom:max(4px,env(safe-area-inset-bottom))}
.bnav-in{display:flex;justify-content:space-around;max-width:500px;margin:0 auto}
.ni{display:flex;flex-direction:column;align-items:center;gap:0;padding:3px 10px;color:var(--tx3);cursor:pointer;border:none;background:none;font:.54rem var(--font);font-weight:600}
.ni svg{width:19px;height:19px;margin-bottom:1px}.ni.on{color:var(--pri)}

/* Search results */
.sres{padding-bottom:10px}
.src{background:#fff;border-radius:var(--r2);padding:10px 12px;margin-bottom:4px;display:flex;align-items:center;gap:9px;box-shadow:0 1px 2px rgba(0,0,0,.03);cursor:pointer;position:relative;overflow:hidden;transition:.12s}
.src::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.src[data-l="1"]::before{background:var(--h1)}.src[data-l="2"]::before{background:var(--h2)}.src[data-l="3"]::before{background:var(--h3)}.src[data-l="4"]::before{background:var(--h4)}

let learned=JSON.parse(localStorage.getItem('hsk_l')||'{}');
let srs=JSON.parse(localStorage.getItem('hsk_srs')||'{}');
let curLvl=0,curDay=null,curMode='learn',pracS={},quizS={};

// SRS: {word: {interval: minutes, next: timestamp, ease: 1-3}}
function isL(h){return learned[h]===true}
function toggleL(h){if(learned[h])delete learned[h];else learned[h]=true;save()}
function save(){localStorage.setItem('hsk_l',JSON.stringify(learned));localStorage.setItem('hsk_srs',JSON.stringify(srs))}
function speak(t){const u=new SpeechSynthesisUtterance(t);u.lang='zh-CN';u.rate=0.8;speechSynthesis.cancel();speechSynthesis.speak(u)}
function getW(){return curLvl===0?W:W.filter(w=>w.l===curLvl)}

// SRS functions
function srsRate(h,ease){
  const now=Date.now();
  const prev=srs[h]||{interval:1,next:0,ease:2};
  let mult=ease===1?0.5:ease===2?1.5:3;
  let newInt=Math.max(1,Math.round(prev.interval*mult));
  if(ease===1)newInt=1;
  srs[h]={interval:newInt,next:now+newInt*60000,ease};
  if(!learned[h])learned[h]=true;
  save();
}
function getDue(){
  const now=Date.now();
  return W.filter(w=>srs[w.h]&&srs[w.h].next<=now);
}

// Build 30 days grouped by root
function buildDays(words){
  const rm={};words.forEach(w=>{const k=w.r==='—'?'_'+w.h:w.r;if(!rm[k])rm[k]={root:w.r,words:[]};rm[k].words.push(w)});
  const gs=Object.values(rm).sort((a,b)=>{const la=a.words[0].l,lb=b.words[0].l;return la!==lb?la-lb:b.words.length-a.words.length});
  const days=Array.from({length:30},()=>[]);const pd=Math.ceil(words.length/30);
  let di=0,dc=0;gs.forEach(g=>{if(dc+g.words.length>pd+8&&di<29){di++;dc=0}days[di].push(g);dc+=g.words.length});return days;
}

function renderHome(){
  const ws=getW(),days=buildDays(ws),total=ws.length,lc=ws.filter(w=>isL(w.h)).length,pct=total?Math.round(lc/total*100):0;
  const nm=['HSK 1-4','HSK 1','HSK 2','HSK 3','HSK 4'];
  document.getElementById('it').textContent=nm[curLvl]+' ('+total+' words)';
  document.getElementById('iw').textContent=total+' words';
  document.getElementById('il').textContent=lc+' learned';
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pt').textContent=lc+'/'+total;
  document.getElementById('pp').textContent=pct+'%';
  document.getElementById('sn').textContent=lc;
  document.getElementById('rn').textContent=getDue().length;
  document.getElementById('dpc').textContent='~'+Math.ceil(total/30)+' words/day';
  let sug=0;for(let i=0;i<days.length;i++){if(days[i].flatMap(g=>g.words).every(w=>isL(w.h)))sug=i+1;else break}
  const grid=document.getElementById('dg');grid.innerHTML='';
  days.forEach((dg,i)=>{
    const dw=dg.flatMap(g=>g.words);if(!dw.length)return;
    const dl=dw.filter(w=>isL(w.h)).length,dp=dw.length?Math.round(dl/dw.length*100):0;
    const t=document.createElement('div');t.className='dtile';
    if(dp===100)t.classList.add('cmp');else if(dp>0)t.classList.add('prt');
    if(i===sug)t.classList.add('tdy');
    t.style.animationDelay=(i*.012)+'s';
    t.innerHTML=`<div class="db">${dw.length}</div><div class="dn">${i+1}</div><div class="dl">Day</div><div class="dpb"><div class="dpf" style="width:${dp}%"></div></div>`;
    t.onclick=()=>openDay(i);grid.appendChild(t);
  });
}

function openDay(di){
  curDay=di;curMode='learn';
  const days=buildDays(getW()),gs=days[di],aw=gs.flatMap(g=>g.words),lc=aw.filter(w=>isL(w.h)).length;
  document.getElementById('dtt').textContent='Day '+(di+1);
  document.getElementById('dts').textContent=aw.length+' words · root grouped';
  document.getElementById('dfr').textContent=lc+'/'+aw.length;
  hideAll();document.getElementById('dayV').classList.add('show');
  setMode('learn');renderLearn(gs);window.scrollTo({top:0});
}

function renderLearn(gs){
  const l=document.getElementById('learnL');l.innerHTML='';
  const wrap=document.createElement('div');wrap.className='lwrap';
  let idx=0;
  gs.forEach(g=>{
    // Root group header (if multi-word root)
    if(g.root!=='—'&&!g.root.startsWith('_')&&g.words.length>1){
      const rh=document.createElement('div');rh.className='rghdr';
      const relCount=W.filter(x=>x.r===g.root).length;
      rh.innerHTML=`<div class="rgchar" onclick="event.stopPropagation();showRootTree('${g.root}')">${g.root}</div><div class="rginfo"><div class="rn">Root: ${g.root}</div><div class="rc">${relCount} words in this family</div></div><div class="rgline"></div>`;
      wrap.appendChild(rh);
    }
    g.words.forEach(v=>{
      const c=document.createElement('div');c.className='wc';c.style.animationDelay=(idx*.012)+'s';idx++;
      const dec=DECOMP[v.h]?`<span class="wdec">${DECOMP[v.h]}</span>`:'';
      const esc=v.h.replace(/'/g,"\\'");
      c.innerHTML=`<div class="wpy">${v.p}</div><div class="whz">${v.h} <button class="spk" onclick="event.stopPropagation();speak('${esc}')">🔊</button></div><div class="wmeta"><span class="wpos">${v.pos}</span><span class="wmn">${v.m} / ${v.b}</span>${dec}</div>`;
      c.onclick=()=>openDet(v);
      wrap.appendChild(c);
    });
  });
  l.appendChild(wrap);
}

function showRootTree(root){
  const words=W.filter(w=>w.r===root);
  if(words.length===0)return;
  openDet(words[0],true);
}

function setMode(m){
  curMode=m;
  ['mL','mP','mQ'].forEach((id,i)=>document.getElementById(id).classList.toggle('on',['learn','practice','quiz'][i]===m));
  document.getElementById('learnL').classList.toggle('show',m==='learn');
  document.getElementById('pracA').classList.toggle('show',m==='practice');
  document.getElementById('quizA').classList.toggle('show',m==='quiz');
  if(m==='practice')startPrac();
  if(m==='quiz')startQuiz();
}

// PRACTICE: Build-a-word
function startPrac(){
  const days=buildDays(getW()),aw=days[curDay].flatMap(g=>g.words);
  const sh=[...aw].sort(()=>Math.random()-.5).slice(0,Math.min(10,aw.length));
  pracS={words:sh,idx:0,score:0,total:sh.length};renderPQ();
}
function renderPQ(){
  const{words,idx,score,total}=pracS;const a=document.getElementById('pracA');
  if(idx>=words.length){a.innerHTML=`<div class="pres"><h3>Practice Complete!</h3><div class="psc">${score}/${total}</div><p style="color:var(--tx3);font-size:.78rem;margin-top:3px">${score===total?'Perfect! 🎉':'Keep going! 💪'}</p></div><button class="pnxt" onclick="startPrac()">Again</button>`;return}
  const w=words[idx],chars=[...w.h];
  const allC=new Set();W.forEach(x=>[...x.h].forEach(c=>allC.add(c)));
  const dist=[...allC].filter(c=>!chars.includes(c)).sort(()=>Math.random()-.5).slice(0,Math.max(4-chars.length,3));
  const ch=[...chars,...dist].sort(()=>Math.random()-.5);
  pracS.slots=Array(chars.length).fill(null);pracS.choices=ch;pracS.answered=false;pracS.cc=chars;
  let dots='';for(let i=0;i<words.length;i++)dots+=`<div class="pdot${i<idx?' dn':''}${i===idx?' cur':''}"></div>`;
  a.innerHTML=`<div class="pdots">${dots}</div><div class="pinst">Build the word from characters · অক্ষর দিয়ে শব্দ তৈরি করুন</div><div class="pprm">${w.m} / ${w.b}</div><div class="pslots" id="ps">${chars.map((_,i)=>`<div class="psl" id="s${i}" onclick="rmSlot(${i})"></div>`).join('')}</div><div class="pchs" id="pc">${ch.map((c,i)=>`<button class="pch" id="c${i}" onclick="pickC(${i},'${c}')">${c}</button>`).join('')}</div><button class="pskip" onclick="pracS.idx++;renderPQ()">Skip →</button>`;
}
function pickC(ci,ch){if(pracS.answered)return;const{slots,cc}=pracS;const ne=slots.indexOf(null);if(ne===-1)return;slots[ne]=ch;document.getElementById('s'+ne).textContent=ch;document.getElementById('s'+ne).classList.add('fl');document.getElementById('c'+ci).classList.add('used');if(!slots.includes(null)){pracS.answered=true;const ok=slots.every((c,i)=>c===cc[i]);if(ok){pracS.score++;slots.forEach((_,i)=>document.getElementById('s'+i).classList.add('ok'))}else{slots.forEach((_,i)=>document.getElementById('s'+i).classList.add(slots[i]===cc[i]?'ok':'wr'))}setTimeout(()=>{pracS.idx++;renderPQ()},ok?700:1400)}}
function rmSlot(si){if(pracS.answered||pracS.slots[si]===null)return;const ch=pracS.slots[si];pracS.slots[si]=null;document.getElementById('s'+si).textContent='';document.getElementById('s'+si).classList.remove('fl');pracS.choices.forEach((c,i)=>{if(c===ch&&document.getElementById('c'+i).classList.contains('used'))document.getElementById('c'+i).classList.remove('used')})}

// QUIZ: 4-choice
function startQuiz(){
  const days=buildDays(getW()),aw=days[curDay].flatMap(g=>g.words);
  const sh=[...aw].sort(()=>Math.random()-.5).slice(0,Math.min(10,aw.length));
  quizS={words:sh,idx:0,score:0,total:sh.length};renderQQ();
}
function renderQQ(){
  const{words,idx,score,total}=quizS;const a=document.getElementById('quizA');
  if(idx>=words.length){a.innerHTML=`<div class="pres"><h3>Quiz Complete!</h3><div class="psc">${score}/${total}</div></div><button class="pnxt" onclick="startQuiz()">Again</button>`;return}
  const w=words[idx];
  const others=W.filter(x=>x.h!==w.h&&x.l===w.l).sort(()=>Math.random()-.5).slice(0,3);
  const opts=[w,...others].sort(()=>Math.random()-.5);
  a.innerHTML=`<div style="font-size:.75rem;color:var(--tx3);margin-bottom:8px">${idx+1}/${total} · Score: ${score}</div><div class="qcard"><div class="qhz">${w.h}</div><div class="qpy">${w.p}</div></div><div class="qopts" id="qopts">${opts.map((o,i)=>`<button class="qopt" onclick="pickQ(${i},${o.h===w.h},'${w.h}')">${o.m} / ${o.b}</button>`).join('')}</div>`;
}
function pickQ(i,correct,hz){
  const btns=document.querySelectorAll('#qopts .qopt');
  btns.forEach((b,j)=>{b.classList.add('dis');if(j===i)b.classList.add(correct?'right':'wrong');if(!correct&&b.textContent.includes(W.find(x=>x.h===hz).m))b.classList.add('right')});
  if(correct)quizS.score++;
  setTimeout(()=>{quizS.idx++;renderQQ()},900);
}

// DETAIL VIEW
function openDet(w,showRoot){
  hideAll();document.getElementById('detV').classList.add('show');
  const rel=W.filter(x=>x.r===w.r&&x.r!=='—'&&x.h!==w.h);
  const pc=({v:'v',n:'n',adj:'adj',adv:'adv',conj:'conj'})[w.pos]||'other';
  const esc=w.h.replace(/'/g,"\\'");
  
  let decHtml='';
  if(DECOMP[w.h])decHtml=`<div class="ddec"><div class="ddl">Character Decomposition · অক্ষর বিশ্লেষণ</div><div class="ddf">${DECOMP[w.h]}</div></div>`;
  
  let rootHtml='';
  if(w.r!=='—'){
    const allRel=W.filter(x=>x.r===w.r);
    rootHtml=`<div class="droot"><div class="drl">Root Family · মূল পরিবার</div><div class="drc">${w.r}</div>${allRel.length>1?`<div class="drw">${allRel.filter(r=>r.h!==w.h).map(r=>`<div class="drch" onclick="openDet(W.find(x=>x.h==='${r.h.replace(/'/g,"\\'")}''))">${r.h} <small>${r.p}</small></div>`).join('')}</div>`:''}</div>`;
  }
  
  let exHtml='';
  const exs=EXAMPLES[w.h];
  if(exs&&exs.length){
    exHtml=`<div class="dexs"><h4>Example Sentences</h4>${exs.map(e=>`<div class="exc"><button class="es" onclick="speak('${e.hz.replace(/[。？！]/g,'').replace(/'/g,"\\'")}')">🔊</button><div class="ep">${e.py}</div><div class="eh">${e.hz.replace(new RegExp(w.h,'g'),`<span class="hl">${w.h}</span>`)}</div><div class="em">${e.en}</div></div>`).join('')}</div>`;
  }

  document.getElementById('detC').innerHTML=`<div class="dcard"><div class="dtop"><div></div><div style="display:flex;gap:5px"><button class="dtbtn ${isL(w.h)?'on':''}" onclick="this.classList.toggle('on');toggleL('${esc}')">✓</button></div></div><div class="dpy">${w.p}</div><div class="dhz">${w.h} <button class="dsp" onclick="speak('${esc}')">🔊</button></div><span class="dpos dpos-${pc}">${w.pos}.</span><div class="dmn">${w.m} / ${w.b}</div>${decHtml}${rootHtml}${exHtml}<div class="srs-btns"><button class="srs-btn srs-hard" onclick="srsRate('${esc}',1)">😰 Hard<br><small>1 min</small></button><button class="srs-btn srs-mid" onclick="srsRate('${esc}',2)">🤔 Medium<br><small>+50%</small></button><button class="srs-btn srs-easy" onclick="srsRate('${esc}',3)">😊 Easy<br><small>+200%</small></button></div></div>`;

  document.getElementById('detBack').onclick=()=>{
    document.getElementById('detV').classList.remove('show');
    if(curDay!==null){document.getElementById('dayV').classList.add('show');
      const days=buildDays(getW()),aw=days[curDay].flatMap(g=>g.words),lc=aw.filter(w2=>isL(w2.h)).length;
      document.getElementById('dfr').textContent=lc+'/'+aw.length;
    }else{document.getElementById('homeV').style.display='';renderHome()}
  };
  window.scrollTo({top:0});
}

// REVIEW (SRS)
function renderReview(){
  const due=getDue();
  document.getElementById('revCount').textContent=due.length+' due';
  document.getElementById('rn').textContent=due.length;
  if(!due.length){document.getElementById('revContent').innerHTML='<div class="rev-empty"><div class="big">✓</div><p>No words due for review!<br>Keep learning new words.</p></div>';return}
  const wrap=document.createElement('div');wrap.className='lwrap';
  due.slice(0,20).forEach((w,i)=>{
    const c=document.createElement('div');c.className='wc';c.style.animationDelay=(i*.015)+'s';
    const esc=w.h.replace(/'/g,"\\'");
    c.innerHTML=`<div class="wpy">${w.p}</div><div class="whz">${w.h} <button class="spk" onclick="event.stopPropagation();speak('${esc}')">🔊</button></div><div class="wmeta"><span class="wpos">${w.pos}</span><span class="wmn">${w.m} / ${w.b}</span></div>`;
    c.onclick=()=>openDet(w);
    wrap.appendChild(c);
  });
  document.getElementById('revContent').innerHTML='';
  document.getElementById('revContent').appendChild(wrap);
}

// STATS
function renderStats(){
  const t=W.length,l=W.filter(w=>isL(w.h)).length,p=t?Math.round(l/t*100):0,due=getDue().length;
  document.getElementById('sg').innerHTML=`<div class="sbox"><div class="sv sv-1">${t}</div><div class="sl">Total Words</div></div><div class="sbox"><div class="sv sv-2">${l}</div><div class="sl">Learned</div></div><div class="sbox"><div class="sv sv-3">${p}%</div><div class="sl">Progress</div></div><div class="sbox"><div class="sv sv-4">${due}</div><div class="sl">Due Review</div></div>`;
  document.getElementById('lp').innerHTML=[1,2,3,4].map(lv=>{
    const lw=W.filter(w=>w.l===lv),ll=lw.filter(w=>isL(w.h)).length,lp=lw.length?Math.round(ll/lw.length*100):0;
    return `<div class="lvrow"><div class="lvn" style="color:var(--h${lv})">HSK ${lv}</div><div class="lvt"><div class="lvf lvf-${lv}" style="width:${lp}%"></div></div><div class="lvpc">${lp}%</div></div>`;
  }).join('');
}

// NAV
function hideAll(){document.getElementById('homeV').style.display='none';['dayV','detV','revV','statV'].forEach(id=>document.getElementById(id).classList.remove('show'));document.getElementById('sresW').style.display='none';document.getElementById('dgw').style.display=''}
function goHome(){curDay=null;hideAll();document.getElementById('homeV').style.display='';document.getElementById('dgw').style.display='';updNav('home');renderHome();window.scrollTo({top:0})}
function navTo(n){
  updNav(n);
  if(n==='home')goHome();
  else if(n==='review'){hideAll();document.getElementById('revV').classList.add('show');renderReview();window.scrollTo({top:0})}
  else if(n==='stats'){hideAll();document.getElementById('statV').classList.add('show');renderStats();window.scrollTo({top:0})}
}
function updNav(n){document.querySelectorAll('.ni').forEach(x=>x.classList.toggle('on',x.dataset.nav===n))}
function resetAll(){if(confirm('Reset all progress? সব মুছে ফেলবেন?')){learned={};srs={};save();goHome()}}

// SEARCH
document.getElementById('sb').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();const sr=document.getElementById('sresW'),dg=document.getElementById('dgw');
  if(!q){sr.style.display='none';dg.style.display='';return}
  sr.style.display='block';dg.style.display='none';
  const res=W.filter(w=>w.h.includes(q)||w.p.toLowerCase().includes(q)||w.m.toLowerCase().includes(q)||w.b.toLowerCase().includes(q)).slice(0,25);
  sr.innerHTML=res.length?res.map(w=>{const esc=w.h.replace(/'/g,"\\'");return `<div class="src" data-l="${w.l}" onclick="openDet(W.find(x=>x.h==='${esc}'))"><div class="sh">${w.h}</div><div class="sb"><div class="sp">${w.p}</div><div class="sm">${w.m} / ${w.b}</div></div><span class="sbd" data-l="${w.l}">HSK${w.l}</span></div>`}).join(''):'<div style="text-align:center;padding:24px;color:var(--tx3)">No results found</div>';
});

// HSK TABS
document.getElementById('tabs').addEventListener('click',e=>{const t=e.target.closest('.tab');if(!t)return;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');curLvl=parseInt(t.dataset.l);if(curDay!==null)goHome();else renderHome()});

renderHome();

</script>
